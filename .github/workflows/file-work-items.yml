name: File Work Items

on:
  push:
    branches: [main]
    paths:
      - 'generated/work-items/active/**/*.md'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  file:
    uses: HoneyDrunkStudios/HoneyDrunk.Actions/.github/workflows/file-work-items.yml@main
    secrets:
      app-id: ${{ secrets.HIVE_APP_ID }}
      app-private-key: ${{ secrets.HIVE_APP_PRIVATE_KEY }}
